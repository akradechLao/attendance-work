[build]
  command = "rm -rf node_modules package-lock.json && npm install && npx prisma generate && next build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  directory = ".netlify/functions-internal"

[build.environment]
  NODE_VERSION = "20"
  NEXT_RUNTIME = "nodejs"
